<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IKEA Rodulf Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-hover: #1a1a24;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #e4e4e7;
            --text-dim: #8f8f9b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.12);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.10);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            padding: 2rem 1rem;
            /* safe-area padding for notched / dynamic-chrome devices */
            padding-top: max(2rem, env(safe-area-inset-top, 0px));
            padding-bottom: max(2rem, env(safe-area-inset-bottom, 0px));
            padding-left: max(1rem, env(safe-area-inset-left, 0px));
            padding-right: max(1rem, env(safe-area-inset-right, 0px));
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 720px;
            margin: 0 auto;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 16px;
            margin-bottom: 1rem;
            box-shadow: 0 0 32px var(--accent-glow);
        }

        header .logo svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.875rem;
            font-weight: 400;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--border-hover);
        }

        .card+.card {
            margin-top: 1rem;
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title svg {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ── Badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 999px;
            letter-spacing: 0.03em;
        }

        .badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        .badge--active {
            background: var(--green-dim);
            color: var(--green);
        }

        .badge--active .dot {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .badge--inactive {
            background: rgba(113, 113, 122, 0.12);
            color: var(--text-dim);
        }

        .badge--inactive .dot {
            background: var(--text-dim);
        }

        .badge--accent {
            background: var(--accent-glow);
            color: #a5b4fc;
        }

        .badge--accent .dot {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .status-row span:first-child {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.7rem 1.25rem;
            cursor: pointer;
            transition: all 0.15s ease;
            outline: none;
            width: 100%;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn--stand {
            background: var(--green-dim);
            color: var(--green);
        }

        .btn--stand:hover {
            background: rgba(34, 197, 94, 0.22);
        }

        .btn--sit {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .btn--sit:hover {
            background: rgba(245, 158, 11, 0.22);
        }

        .btn--stop {
            background: var(--red-dim);
            color: var(--red);
            grid-column: 1 / -1;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 0.75rem;
        }

        .btn--stop:hover {
            background: rgba(239, 68, 68, 0.20);
        }

        .btn--accent {
            background: var(--accent);
            color: #fff;
        }

        .btn--accent:hover {
            background: #4f46e5;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn--ghost {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn--ghost:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-color: var(--border-hover);
        }

        .btn--sm {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
        }

        /* ── Inputs ── */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .field label {
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .input {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.6rem 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input::placeholder {
            color: var(--text-dim);
        }

        /* hide number spinners */
        .input::-webkit-inner-spin-button,
        .input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input[type=number] {
            -moz-appearance: textfield;
        }

        .inline-field {
            display: flex;
            gap: 0.5rem;
        }

        .inline-field .input {
            flex: 1;
        }

        .inline-field .btn {
            width: auto;
            white-space: nowrap;
        }

        /* ── Timings row ── */
        .timing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: var(--surface);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 0.6rem 1.25rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast {
            /* keep toast above safe-area bottom bar */
            bottom: max(1.5rem, env(safe-area-inset-bottom, 0px));
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .timing-grid {
                grid-template-columns: 1fr 1fr;
            }

            .timing-grid .btn {
                grid-column: 1 / -1;
            }
        }

        /* ── Pulse animation for connecting state ── */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .4;
            }
        }

        .pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ── iOS / Android dynamic-chrome fix (fallback for no dvh support) ── */
        @supports not (min-height: 100dvh) {
            body {
                min-height: calc(var(--vh, 1vh) * 100);
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5-3L16.5 18m0 0L12 13.5m4.5 4.5V4.5" />
                </svg>
            </div>
            <h1>Rodulf Control</h1>
            <p>IKEA smart desk controller</p>
        </header>

        <!-- Desk Status -->
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 9h18v3H3V9Zm3 3v8m12-8v8M9 14h6m-6 3h6" />
                </svg>
                Desk Position
            </div>
            <div class="status-row">
                <span>Current position</span>
                <span id="heightState" class="badge badge--accent pulse"><span class="dot"></span>CONNECTING</span>
            </div>
            <div class="grid-2">
                <button onclick="cmd('/standing')" class="btn btn--stand">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                    </svg>
                    Standing
                </button>
                <button onclick="cmd('/seated')" class="btn btn--sit">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                    </svg>
                    Seated
                </button>
                <button onclick="cmd('/stop')" class="btn btn--stop">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                    </svg>
                    Emergency Stop
                </button>
            </div>
        </div>

        <!-- Auto Mode -->
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
                </svg>
                Auto Mode
            </div>
            <div class="status-row">
                <span>Rotation status</span>
                <span id="autoState" class="badge badge--inactive"><span class="dot"></span>...</span>
            </div>
            <div class=status-row>
                <span>Next toggle in</span>
                <span id="countdown">--:--</span>
            </div>
            <div class="field">
                <label for="autoMinutes">Interval (minutes)</label>
                <div class="inline-field" style="margin-bottom: 0.75rem;">
                    <input type="number" id="autoMinutes" class="input">
                    <button onclick="setAuto()" class="btn btn--accent btn--sm" style="width:auto;">Apply</button>
                </div>
            </div>
            <div class="btn-group">
                <button onclick="toggleAuto(1)" class="btn btn--stand btn--sm">Enable</button>
                <button onclick="toggleAuto(0)" class="btn btn--ghost btn--sm">Disable</button>
            </div>
        </div>

        <!-- Timings -->
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                Motor Timings
            </div>
            <div class="timing-grid">
                <div class="field">
                    <label for="timeUp">Up duration (ms)</label>
                    <input type="number" id="timeUp" class="input" placeholder="e.g. 7500">
                </div>
                <div class="field">
                    <label for="timeDown">Down duration (ms)</label>
                    <input type="number" id="timeDown" class="input" placeholder="e.g. 7500">
                </div>
                <button onclick="saveTime()" class="btn btn--accent" style="height:42px;">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script>
        let remainingSeconds = 0;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }

        function updateStatus() {
            fetch('/status').then(r => r.json()).then(data => {
                const hb = document.getElementById('heightState');
                const state = data.heightState.toUpperCase();
                hb.innerHTML = `<span class="dot"></span>${state}`;
                hb.className = state === 'STANDING'
                    ? 'badge badge--active'
                    : state === 'SEATED'
                        ? 'badge badge--accent'
                        : 'badge badge--inactive';

                const ab = document.getElementById('autoState');
                ab.innerHTML = data.autoMode
                    ? '<span class="dot"></span>ENABLED'
                    : '<span class="dot"></span>DISABLED';
                ab.className = data.autoMode ? 'badge badge--active' : 'badge badge--inactive';

                if (!document.getElementById('timeUp').value) {
                    document.getElementById('timeUp').value = data.timeUpMs;
                    document.getElementById('timeDown').value = data.timeDownMs;
                    document.getElementById('autoMinutes').value = data.intervalMinutes;
                }

                if (data.autoMode) {
                    remainingSeconds = Math.floor(data.remainingMs / 1000);
                } else {
                    remainingSeconds = 0;
                }
            }).catch(() => {
                document.getElementById('heightState').innerHTML = '<span class="dot"></span>OFFLINE';
                document.getElementById('heightState').className = 'badge badge--inactive';
            });
        }

        function cmd(url) {
            fetch(url).then(() => {
                const label = url.includes('standing') ? 'Moving up…' : url.includes('seated') ? 'Moving down…' : 'Stopped!';
                showToast(label);
                setTimeout(updateStatus, 500);
            });
        }

        function toggleAuto(val) {
            fetch(`/auto?enable=${val}`).then(() => {
                showToast(val ? 'Auto mode enabled' : 'Auto mode disabled');
                updateStatus();
            });
        }

        function setAuto() {
            const min = document.getElementById('autoMinutes').value;
            fetch(`/auto?interval=${min}`).then(() => {
                showToast(`Interval set to ${min} min`);
                updateStatus();
            });
        }

        function saveTime() {
            const up = document.getElementById('timeUp').value;
            const down = document.getElementById('timeDown').value;
            fetch(`/config/set?up=${up}&down=${down}`).then(() => {
                showToast('Timings saved');
                updateStatus();
            });
        }

        /* ── Dynamic viewport height fallback for older mobile browsers ── */
        function setVh() {
            // Use visualViewport height when available (handles keyboard & chrome)
            const h = window.visualViewport
                ? window.visualViewport.height
                : window.innerHeight;
            document.documentElement.style.setProperty('--vh', (h * 0.01) + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setVh);
        }

        function startCountdown() {
            setInterval(() => {
                const countdown = document.getElementById("countdown");
                const autoEnabled = document.getElementById("autoState")
                    .textContent.includes("ENABLED");

                if (!autoEnabled) {
                    countdown.textContent = "--:--";
                    return;
                }

                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;

                countdown.textContent =
                    `${mins}:${secs.toString().padStart(2, '0')}`;

                if (remainingSeconds > 0) {
                    remainingSeconds--;
                }
            }, 1000);
        }

        startCountdown();
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>

</html>
